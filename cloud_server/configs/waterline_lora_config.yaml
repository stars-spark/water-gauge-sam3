# SAM3 LoRA 配置 —— 水位线精细模型 (WaterLine.v1i: Gauge_Air / Gauge_Water)
# 与 autodl_training_backup/.../SAM3_LoRa_Waterline_outputs/best_lora_weights.pt 匹配
# 关键差异(相对 full_lora_config.yaml): rank=8, 不微调 vision backbone, 加 mask_decoder
model:
  name: "facebook/sam3"
  cache_dir: null

lora:
  rank: 8
  alpha: 16
  dropout: 0.0                # 推理时关闭
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "out_proj"
    - "qkv"
    - "proj"
  apply_to_vision_encoder: false
  apply_to_text_encoder: false
  apply_to_geometry_encoder: false
  apply_to_detr_encoder: false
  apply_to_detr_decoder: true
  apply_to_mask_decoder: true
