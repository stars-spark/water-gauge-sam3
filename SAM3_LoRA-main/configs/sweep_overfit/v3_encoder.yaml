# [#2 过拟合扫描] V3 = 治清水域差。据 MapSAM2(古地图OOD)/DA²-Net(遥感):域差住在图像编码器特征里,
#   光调 decoder 救不回 → 在 V1 低容量底子(rank4/dropout0.35)上【打开 vision encoder LoRA】(仅qkv/proj注意力,不含MLP,保持轻量)。
#   ⚠️评判口径特殊:V3 主看【清水 held-out(005类)是否改善】+【其余真实图不回归】;encoder LoRA 加容量,若反过拟合(15图退)则弃。
#   相对 V0:apply_to_vision_encoder true + rank4/alpha8/dropout0.35。
model:
  name: "facebook/sam3"
  cache_dir: null

lora:
  rank: 4
  alpha: 8
  dropout: 0.35
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "out_proj"
    - "qkv"
    - "proj"
  apply_to_vision_encoder: true
  apply_to_text_encoder: false
  apply_to_geometry_encoder: false
  apply_to_detr_encoder: false
  apply_to_detr_decoder: true
  apply_to_mask_decoder: true

training:
  data_dir: "/media/jiale/AI_Local/水尺水位测量系统/02_数据集/waterline_v1_coco"
  batch_size: 4
  gradient_checkpointing: true
  num_workers: 8
  learning_rate: 3e-5
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1e-8
  max_grad_norm: 1.0
  num_epochs: 15          # 过拟合在 epoch3-4，15 足够看清 px 曲线拐点，省 GPU
  warmup_steps: 60
  lr_scheduler: "cosine"
  logging_steps: 5
  eval_steps: 30
  save_steps: 30
  save_total_limit: 3
  mixed_precision: "bf16"
  seed: 42
  gradient_accumulation_steps: 8
  save_every_epoch: true   # ★ 本次扫描核心开关

output:
  output_dir: "SAM3_LoRa_Waterline_sweep_v3"
  logging_dir: "logs"
  save_lora_only: true
  push_to_hub: false
  hub_model_id: null

evaluation:
  metric: "iou"
  save_predictions: true
  compute_metrics_during_training: true

hardware:
  device: "cuda"
  dataloader_pin_memory: true
  use_compile: false
